<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🧠 Troll Mode Cài Đặt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container column">
    <h1>🧠 Troll Mode</h1>
    <div id="loginSection">
      <input type="password" id="adminPass" placeholder="Nhập mật khẩu admin">
      <button class="btn" onclick="checkPass()">Đăng nhập</button>
    </div>

    <div id="adminPanel" style="display:none;">
      <label><b>Chọn chế độ:</b></label>
      <select id="rigMode">
        <option value="none">Không rig (chơi thật)</option>
        <option value="tai">Luôn ra Tài</option>
        <option value="xiu">Luôn ra Xỉu</option>
      </select>
      <button class="btn" onclick="saveMode()">💾 Lưu chế độ</button>
      <p id="status"></p>
      <a href="index.html" class="btn small">⬅️ Quay lại chơi</a>
    </div>
  </div>

  <script>
    function checkPass() {
      const pass = document.getElementById('adminPass').value;
      if (pass === 'troll') {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        const saved = localStorage.getItem('rigMode') || 'none';
        document.getElementById('rigMode').value = saved;
      } else {
        alert('Sai mật khẩu! (hint: troll)');
      }
    }

    function saveMode() {
      const mode = document.getElementById('rigMode').value;
      localStorage.setItem('rigMode', mode);
      document.getElementById('status').textContent = `✅ Đã lưu chế độ: ${mode}`;
    }
  </script>
</body>
</html>
