<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tài Xỉu — Web Troll</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="status-row">
      <div class="balance-box">
        👤 <span id="usernameDisplay"></span> — 💰 <span id="balance">0₫</span>
      </div>
      <div class="reset-box">
        <button class="btn small" id="logoutBtn">Đăng xuất</button>
        <button class="btn small" id="resetBalance">Reset tiền</button>
      </div>
    </div>

    <h1>🎲 Game Tài Xỉu</h1>

    <div class="bet-section">
      <input type="number" id="betAmount" placeholder="Nhập số tiền cược">

      <select id="modeSelect">
        <option value="random">🎲 Random bình thường</option>
        <option value="taiHigh">💥 Tỉ lệ Tài cao hơn</option>
        <option value="xiuHigh">💧 Tỉ lệ Xỉu cao hơn</option>
        <option value="allTai">🔥 Toàn Tài</option>
        <option value="allXiu">❄️ Toàn Xỉu</option>
      </select>

      <div class="bet-buttons">
        <button class="btn" id="taiBtn">Tài</button>
        <button class="btn" id="xiuBtn">Xỉu</button>
      </div>
    </div>

    <div class="dice">
      <div id="dice1" class="die">🎲</div>
      <div id="dice2" class="die">🎲</div>
      <div id="dice3" class="die">🎲</div>
    </div>

    <h2 id="result"></h2>
  </div>

  <script src="script.js"></script>
</body>
</html>
